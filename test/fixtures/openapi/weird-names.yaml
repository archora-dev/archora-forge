openapi: 3.0.3
info: { title: Weird Names, version: 1.0.0 }
paths:
  /users:
    get:
      operationId: get-user
      responses:
        '200':
          description: User
          content:
            application/json:
              schema: { $ref: '#/components/schemas/user-profile' }
components:
  schemas:
    user-profile:
      type: object
      properties:
        created-at: { type: string }
        x-total-count: { type: integer }
        user.name: { type: string }
        status: { type: string, enum: ['in-progress', 'needs review'] }
