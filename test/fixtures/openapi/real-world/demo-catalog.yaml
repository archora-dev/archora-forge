components:
  schemas:
    Product:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        name:
          type: string
        sku:
          type: string
        price:
          type: number
    CreateProductDto:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        sku:
          type: string
        price:
          type: number
    Category:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
    CreateCategoryDto:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
    Brand:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
    CreateBrandDto:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
    Collection:
      type: object
      required:
        - id
      properties:
