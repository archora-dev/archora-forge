openapi: 3.0.3
info: { title: Path Params, version: 1.0.0 }
paths:
  /users/{id}:
    get:
      operationId: getUser
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        '200':
          description: User
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
  /teams/{teamId}/users/{userId}:
    parameters:
      - { name: teamId, in: path, required: true, schema: { type: string } }
    get:
      operationId: getTeamUser
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: User
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
components:
  schemas:
    User:
      type: object
      properties:
        id: { type: string }
