openapi: 3.0.3
info:
  title: Archora Forge Example API
  version: 1.0.0
tags:
  - name: Users
  - name: Orders
  - name: Reports
paths:
  /users:
    get:
      operationId: listUsers
      tags: [Users]
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer
                  page:
                    type: integer
        '401':
          description: Unauthorized
    post:
      operationId: createUser
      tags: [Users]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users/{id}:
    get:
      operationId: getUser
      tags: [Users]
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      operationId: updateUser
      tags: [Users]
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      operationId: deleteUser
      tags: [Users]
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
  /reports:
    get:
      operationId: listReports
      tags: [Reports]
      responses:
        '200':
          description: Reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Report'
                  total:
                    type: integer
                  page:
                    type: integer
  /orders:
    get:
      operationId: listOrders
      tags: [Orders]
      responses:
        '200':
          description: Orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  total:
                    type: integer
                  page:
                    type: integer
        '401':
          description: Unauthorized
    post:
      operationId: createOrder
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '422':
          description: Validation error
  /orders/{id}:
    get:
      operationId: getOrder
      tags: [Orders]
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Not found
    patch:
      operationId: updateOrder
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderDto'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '422':
          description: Validation error
    delete:
      operationId: deleteOrder
      tags: [Orders]
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
components:
  schemas:
    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, blocked, pending]
          description: User lifecycle status
        age:
          type: integer
          minimum: 18
          maximum: 120
          nullable: true
        verified:
          type: boolean
          description: Whether the user confirmed their email
        password:
          type: string
          minLength: 12
          writeOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        profile:
          type: object
          properties:
            city:
              type: string
            timezone:
              type: string
    Order:
      type: object
      required: [id, number, status, total]
      properties:
        id:
          type: string
          readOnly: true
        number:
          type: string
        status:
          type: string
          enum: [draft, paid, shipped]
        total:
          type: number
          minimum: 0
        paid:
          type: boolean
        dueDate:
          type: string
          format: date
        customer:
          type: object
          properties:
            name:
              type: string
    CreateOrderDto:
      type: object
      required: [number, status, total]
      properties:
        number:
          type: string
        status:
          type: string
          enum: [draft, paid, shipped]
        total:
          type: number
          minimum: 0
        paid:
          type: boolean
        dueDate:
          type: string
          format: date
        customer:
          type: object
          properties:
            name:
              type: string
    UpdateOrderDto:
      type: object
      properties:
        status:
          type: string
          enum: [draft, paid, shipped]
        total:
          type: number
          minimum: 0
        paid:
          type: boolean
        dueDate:
          type: string
          format: date
    Report:
      type: object
      required: [id, title, status, generatedAt]
      properties:
        id:
          type: string
          readOnly: true
        title:
          type: string
        status:
          type: string
          enum: [ready, processing, failed]
        generatedAt:
          type: string
          format: date-time
        owner:
          type: string
        rows:
          type: integer
          minimum: 0
