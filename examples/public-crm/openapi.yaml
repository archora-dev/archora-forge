openapi: 3.0.3
info:
  title: Public CRM Demo API
  version: 1.0.0
  description: Neutral demo contract for Archora Forge public preview evaluation.
servers:
  - url: https://api.example.test
tags:
  - name: Contacts
  - name: Companies
  - name: Search
  - name: Dashboard
  - name: Files
paths:
  /contacts:
    get:
      tags: [Contacts]
      operationId: listContacts
      summary: List contacts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ContactStatus'
        - name: companyId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Contact page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactPage'
        '400':
          $ref: '#/components/responses/Error'
    post:
      tags: [Contacts]
      operationId: createContact
      summary: Create contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreatePayload'
      responses:
        '201':
          description: Created contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/Error'
  /contacts/{contactId}:
    get:
      tags: [Contacts]
      operationId: getContact
      summary: Get contact
      parameters:
        - $ref: '#/components/parameters/ContactId'
      responses:
        '200':
          description: Contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Contacts]
      operationId: updateContact
      summary: Update contact
      parameters:
        - $ref: '#/components/parameters/ContactId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactUpdatePayload'
      responses:
        '200':
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Contacts]
      operationId: deleteContact
      summary: Delete contact
      parameters:
        - $ref: '#/components/parameters/ContactId'
      responses:
        '204':
          description: Contact deleted
        '400':
          $ref: '#/components/responses/Error'
  /contacts/{contactId}/archive:
    post:
      tags: [Contacts]
      operationId: archiveContact
      summary: Archive contact
      parameters:
        - $ref: '#/components/parameters/ContactId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveContactRequest'
      responses:
        '200':
          description: Archived contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/Error'
  /companies:
    get:
      tags: [Companies]
      operationId: listCompanies
      summary: List companies
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: industry
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Company page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyPage'
        '400':
          $ref: '#/components/responses/Error'
    post:
      tags: [Companies]
      operationId: createCompany
      summary: Create company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyCreatePayload'
      responses:
        '201':
          description: Created company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          $ref: '#/components/responses/Error'
  /companies/{companyId}:
    get:
      tags: [Companies]
      operationId: getCompany
      summary: Get company
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Companies]
      operationId: updateCompany
      summary: Update company
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyUpdatePayload'
      responses:
        '200':
          description: Updated company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Companies]
      operationId: deleteCompany
      summary: Delete company
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '204':
          description: Company deleted
        '400':
          $ref: '#/components/responses/Error'
  /search:
    get:
      tags: [Search]
      operationId: searchWorkspace
      summary: Search contacts and companies
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: type
          in: query
          schema:
            type: string
            enum: [contact, company]
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchResult'
        '400':
          $ref: '#/components/responses/Error'
  /dashboard/summary:
    get:
      tags: [Dashboard]
      operationId: getDashboardSummary
      summary: Read-only dashboard summary
      responses:
        '200':
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
        '400':
          $ref: '#/components/responses/Error'
  /files/{fileId}/download:
    get:
      tags: [Files]
      operationId: downloadFile
      summary: Download an attachment
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Binary file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/Error'
components:
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    ContactId:
      name: contactId
      in: path
      required: true
      schema:
        type: string
    CompanyId:
      name: companyId
      in: path
      required: true
      schema:
        type: string
  schemas:
    ContactStatus:
      type: string
      enum: [lead, active, archived]
    Contact:
      type: object
      required: [id, email, displayName, status, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        companyId:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ContactStatus'
        lastContactedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    ContactCreatePayload:
      type: object
      required: [email, displayName]
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
        companyId:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ContactStatus'
    ContactUpdatePayload:
      type: object
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
        companyId:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ContactStatus'
    ArchiveContactRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 3
    ContactPage:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    Company:
      type: object
      required: [id, name, industry, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        industry:
          type: string
        website:
          type: string
          format: uri
          nullable: true
        ownerContactId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    CompanyCreatePayload:
      type: object
      required: [name, industry]
      properties:
        name:
          type: string
        industry:
          type: string
        website:
          type: string
          format: uri
          nullable: true
    CompanyUpdatePayload:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        website:
          type: string
          format: uri
          nullable: true
        ownerContactId:
          type: string
          nullable: true
    CompanyPage:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Company'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    SearchResult:
      type: object
      required: [id, type, title]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [contact, company]
        title:
          type: string
        subtitle:
          type: string
          nullable: true
    DashboardSummary:
      type: object
      required: [activeContacts, openCompanies, conversionRate]
      properties:
        activeContacts:
          type: integer
        openCompanies:
          type: integer
        conversionRate:
          type: number
          format: float
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
