name: Forge Impact

on:
  pull_request:
    paths:
      - 'openapi.yaml'
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  impact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Save base schema
        run: git show origin/${{ github.base_ref }}:openapi.yaml > openapi.base.yaml

      - name: Run Forge impact
        run: |
          pnpm exec archora-forge impact openapi.base.yaml openapi.yaml \
            --repo . \
            --json \
            --report-file forge-impact.json \
            --pr-comment-file forge-impact-pr.md

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: forge-impact
          path: |
            forge-impact.json
            forge-impact-pr.md

      - uses: thollander/actions-comment-pull-request@v3
        if: always() && github.event_name == 'pull_request'
        with:
          file-path: forge-impact-pr.md
