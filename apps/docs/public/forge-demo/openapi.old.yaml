openapi: 3.0.3
info: { title: Forge Demo API, version: 1.0.0 }
paths:
  /users:
    get:
      operationId: listUsers
      tags: [Users]
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, email]
                  properties:
                    id: { type: string }
                    email: { type: string }
